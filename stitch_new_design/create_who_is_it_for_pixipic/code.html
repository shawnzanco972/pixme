<style>
        body {
            background-color: theme('colors.surface');
            background-image: radial-gradient(theme('colors.on-surface') 1px, transparent 1px);
            background-size: 24px 24px;
            background-position: 0 0;
            background-color: theme('colors.surface');
        }
        .btn-extruded {
            border-bottom-width: 4px;
            border-bottom-color: theme('colors.primary-container');
            transition: all 0.1s;
        }
        .btn-extruded:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
            margin-bottom: 4px;
        }
        .card-extruded {
            border-bottom-width: 4px;
            border-bottom-color: theme('colors.surface-variant');
            transition: all 0.1s;
        }
        .card-extruded:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .card-extruded:active {
            border-bottom-width: 0px;
            transform: translateY(4px);
        }
        .card-extruded.selected {
            border-color: theme('colors.secondary');
            border-bottom-color: theme('colors.secondary-container');
            background-color: theme('colors.secondary-fixed');
        }
    </style>
</head>
<body class="text-on-surface font-body-md bg-surface min-h-screen flex flex-col relative overflow-x-hidden">
<!-- TopNavBar: Suppressed because this is a linear/transactional checkout flow -->
<!-- Main Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-grid-margin py-stack-xl max-w-7xl mx-auto w-full z-10">
<!-- Progress Indicator -->
<div class="mb-stack-lg w-full max-w-2xl">
<div class="flex justify-between items-center mb-stack-xs text-on-surface-variant font-label-md text-label-md">
<span class="flex items-center gap-1"><span class="w-6 h-6 rounded-full bg-surface-variant text-center leading-6">1</span> עיצוב</span>
<span class="flex items-center gap-1 font-bold text-primary"><span class="w-6 h-6 rounded-full bg-primary text-on-primary text-center leading-6 shadow-sm">2</span> למי</span>
<span class="flex items-center gap-1 opacity-50"><span class="w-6 h-6 rounded-full bg-surface-variant text-center leading-6">3</span> פרטים</span>
</div>
<!-- Progress Bar (Studs) -->
<div class="flex gap-1 h-3">
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-primary rounded-full"></div>
<div class="flex-1 bg-surface-variant rounded-full"></div>
</div>
</div>
<!-- Header -->
<div class="text-center mb-stack-xl">
<h1 class="font-display-lg text-display-lg md:text-display-lg font-display-lg-mobile text-display-lg-mobile mb-stack-sm text-on-surface">עבור מי ההזמנה?</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">בחרו למי מיועדת הערכה שאתם בונים.</p>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter w-full max-w-2xl mb-stack-xl">
<!-- Option 1: For Me -->
<button class="card-extruded bg-surface-container-lowest border-2 border-surface-variant rounded-xl p-stack-lg flex flex-col items-center justify-center text-center group focus:outline-none focus:ring-4 focus:ring-secondary focus:ring-opacity-50" onclick="selectOption(this)">
<div class="w-20 h-20 rounded-full bg-surface-container-highest flex items-center justify-center mb-stack-md group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[40px] text-on-surface-variant group-hover:text-primary" style="font-variation-settings: 'FILL' 1;">person</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-xs">לעצמי</h3>
<p class="font-body-md text-body-md text-on-surface-variant">הערכה תשלח אליכם הביתה</p>
</button>
<!-- Option 2: Gift -->
<button class="card-extruded bg-surface-container-lowest border-2 border-surface-variant rounded-xl p-stack-lg flex flex-col items-center justify-center text-center group focus:outline-none focus:ring-4 focus:ring-secondary focus:ring-opacity-50" onclick="selectOption(this)">
<div class="w-20 h-20 rounded-full bg-surface-container-highest flex items-center justify-center mb-stack-md group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[40px] text-on-surface-variant group-hover:text-primary" style="font-variation-settings: 'FILL' 1;">featured_seasonal_and_gifts</span>
</div>
<h3 class="font-headline-md text-headline-md text-on-surface mb-stack-xs">מתנה</h3>
<p class="font-body-md text-body-md text-on-surface-variant">הערכה תשלח ישירות למקבל המתנה</p>
</button>
</div>
<!-- Navigation Actions -->
<div class="flex justify-between w-full max-w-2xl mt-auto pt-stack-md border-t-2 border-surface-variant">
<button class="px-6 py-3 font-label-md text-label-md font-bold text-on-surface-variant hover:bg-surface-container-highest rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-secondary">
                חזרה
            </button>
<button class="btn-extruded bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md font-bold py-3 px-8 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-primary focus:ring-offset-2">
                המשך
            </button>
</div>
</main>
<!-- Footer: Suppressed for focused transactional flow -->
<script>
        function selectOption(selectedElement) {
            // Remove selected class from all cards
            const cards = document.querySelectorAll('.card-extruded');
            cards.forEach(card => {
                card.classList.remove('selected');
                // Reset icon colors
                const icon = card.querySelector('.material-symbols-outlined');
                if(icon) {
                    icon.classList.remove('text-secondary');
                    icon.classList.add('text-on-surface-variant');
                }
            });

            // Add selected class to the clicked card
            selectedElement.classList.add('selected');
            
            // Highlight icon in selected card
            const selectedIcon = selectedElement.querySelector('.material-symbols-outlined');
            if(selectedIcon) {
                selectedIcon.classList.remove('text-on-surface-variant');
                selectedIcon.classList.remove('group-hover:text-primary');
                selectedIcon.classList.add('text-secondary');
            }
        }
    </script>
</body></html>
